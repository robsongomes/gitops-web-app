apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webapp-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/seu-org/gitops-repo.git
    targetRevision: main
    path: charts/webapp
    helm:
      valueFiles:
        - ../../environments/dev/webapp-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true